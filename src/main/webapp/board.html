<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<title>게시판 - SH Company</title>
<link rel="stylesheet" href="css/main.css"/>
<link rel="stylesheet" href="css/board.css"/>
<script src="js/sidebar.js" defer></script>
<script src="js/header.js" defer></script>
<script src="js/board.js" defer></script>
</head>
<body>
	<div class="container">
		<div class="sidebar" id="sidebar"></div>

		<div class="main-wrapper">
			<div class="header" id="header"></div>

			<div class="content">
				<!-- 타이틀 + 검색 -->
				<div class="contain">
					<span class="board-header">일반 게시판</span>
					<div class="inner">
						<select class="search-type" id="search-type">
							<option value="title">제목</option>
							<option value="writer">작성자</option>
							<option value="all">전체</option>
						</select> <input type="text" class="search-input" id="search-input"
							placeholder="검색어를 입력하세요" /> <input type="button"
							class="board-search" id="btn-search" value="검색" />
						<input type="button" class="board-deepsearch" id="btn-reset"
							value="초기화" />
					</div>
				</div>

				<!-- 게시판 리스트 -->
				<div class="board">
					<div class="board-list" id="board-list">
						<!-- 헤더 행 -->
						<div class="board-row board-list-header">
							<span class="board-number">번호</span> <span class="board-title">제목</span>
							<span class="board-writer">작성자</span> <span
								class="board-writeday">작성일</span>
						</div>

						<!-- 데이터 행 (JS가 채움) -->
						<div id="board-items"></div>
					</div>
				</div>

				<!-- 글쓰기 버튼 -->
				<div class="board-action-row">
					<input type="button" class="btn-write" value="글쓰기" />
				</div>

				<!-- 게시판의 페이지? -->
				<div class="pagination" id="pagination"></div>
			</div>
		</div>
	</div>
</body>
</html>
